services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cia
      POSTGRES_PASSWORD: cia
      POSTGRES_DB: cia
    ports:
      - "5432:5432"
      # Host 5433 for local .env variants that point at postgres on 5433
      - "5433:5432"
    volumes:
      - cia_pgdata:/var/lib/postgresql/data

volumes:
  cia_pgdata:
