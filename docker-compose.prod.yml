# Production stack: public HTTP on host port 6000 (gateway → Nuxt + FastAPI).
# On the server: copy deploy/env.deploy.example to .env.deploy, edit secrets, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cia
      POSTGRES_PASSWORD: cia
      POSTGRES_DB: cia
    volumes:
      - cia_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cia -d cia"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://cia:cia@db:5432/cia
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:6000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-auto}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-qwen/qwen3-vl-32b-instruct}
    volumes:
      - api_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: ""
      NUXT_API_INTERNAL: http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "6000:6000"
    volumes:
      - ./deploy/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  cia_pgdata:
  api_storage:
